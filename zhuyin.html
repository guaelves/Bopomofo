<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>22個二拼結合韻互動式注音學習單生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'DFKai-SB', 'BiauKai', '微軟正黑體', sans-serif;
            margin: 20px;
            background-color: #f0f4f8;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .control-panel {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h3 { margin: 15px 0 5px 0; color: #2b6cb0; font-size: 16px; }
        
        .grid-section {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-combin {
            padding: 8px 14px;
            font-size: 16px;
            background-color: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            font-family: 'DFKai-SB', 'BiauKai', sans-serif;
        }
        .btn-combin:hover {
            background-color: #e0f2fe;
            border-color: #7dd3fc;
            color: #0369a1;
            transform: translateY(-1px);
        }
        .btn-combin.active {
            background-color: #3b82f6;
            border-color: #2563eb;
            color: white;
            font-weight: bold;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .current-status {
            font-size: 18px;
            font-weight: bold;
            color: #0f172a;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 6px;
        }
        button.main-btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download { background-color: #059669; color: white; }
        .btn-download:hover { background-color: #047857; }
        
        .canvas-container { text-align: center; margin-top: 20px; }
        canvas {
            border: 1px solid #cbd5e1;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <h2>22個二拼結合韻互動面板</h2>
        <p style="color: #64748b; font-size: 14px; margin-top: -5px;">請直接點選下方對照圖中的任意結合韻組合，注音與聲調將會同步以特大尺寸生成：</p>
        
        <h3>【ㄧ】的結合韻系列 (10組)</h3>
        <div class="grid-section">
            <div class="btn-group" id="group-i"></div>
        </div>

        <h3>【ㄨ】的結合韻系列 (8組)</h3>
        <div class="grid-section">
            <div class="btn-group" id="group-u"></div>
        </div>

        <h3>【ㄩ】的結合韻系列 (4組)</h3>
        <div class="grid-section">
            <div class="btn-group" id="group-yu"></div>
        </div>

        <div class="action-row">
            <div class="current-status" id="current-text">目前選取：ㄧ + ㄚ</div>
            <button class="main-btn btn-download" onclick="downloadPDF()">下載當前組合 A4 PDF</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="worksheet" width="800" height="1130"></canvas>
    </div>
</div>

<script>
    const seriesI = ['ㄧㄚ', 'ㄧㄛ', 'ㄧㄝ', 'ㄧㄞ', 'ㄧㄠ', 'ㄧㄡ', 'ㄧㄢ', 'ㄧㄣ', 'ㄧㄤ', 'ㄧㄥ'];
    const seriesU = ['ㄨㄚ', 'ㄨㄛ', 'ㄨㄞ', 'ㄨㄟ', 'ㄨㄢ', 'ㄨㄣ', 'ㄨㄤ', 'ㄨㄥ'];
    const seriesYu = ['ㄩㄝ', 'ㄩㄢ', 'ㄩㄣ', 'ㄩㄥ'];

    let currentBopo = { m: 'ㄧ', f: 'ㄚ' };

    function buildPanel() {
        renderGroup('group-i', seriesI, 'ㄧ');
        renderGroup('group-u', seriesU, 'ㄨ');
        renderGroup('group-yu', seriesYu, 'ㄩ');
    }

    function renderGroup(targetId, list, medial) {
        const container = document.getElementById(targetId);
        list.forEach(combin => {
            const final = combin.replace(medial, '');
            const btn = document.createElement('button');
            btn.className = 'btn-combin';
            btn.textContent = combin;
            
            if (medial === 'ㄧ' && final === 'ㄚ') btn.classList.add('active');
            
            btn.onclick = function() {
                document.querySelectorAll('.btn-combin').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentBopo = { m: medial, f: final };
                document.getElementById('current-text').textContent = `目前選取：${medial} + ${final}`;
                drawWorksheet();
            };
            container.appendChild(btn);
        });
    }

    function drawWorksheet() {
        const canvas = document.getElementById('worksheet');
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 1. 標題
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 44px DFKai-SB, BiauKai, "微軟正黑體"';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('注音學習單', 50, 40);
        
        const bopomofo = { mid: currentBopo.m, bot: currentBopo.f };

        // 2. 上方兩個大九宮格
        const largeGridY = 120;
        const largeGridSize = 330;
        drawJiugonge(ctx, 50, largeGridY, largeGridSize, bopomofo, '', true, 'black');
        drawJiugonge(ctx, 420, largeGridY, largeGridSize, bopomofo, '', true, 'outline');
        
        // 3. 下方三排小九宮格
        const smallGridStartY = 490;
        const smallGridSize = 160;
        const gapX = 30;
        const baseGapY = 30;
        const shiftUpOffset = 25;
        
        const tones = ['', 'ˊ', 'ˇ', 'ˋ'];
        
        for (let row = 0; row < 3; row++) {
            let y = smallGridStartY;
            if (row === 0) y = smallGridStartY;
            else if (row === 1) y = smallGridStartY + smallGridSize + baseGapY + shiftUpOffset;
            else if (row === 2) y = smallGridStartY + (smallGridSize + baseGapY) * 2 + shiftUpOffset;

            for (let col = 0; col < 4; col++) {
                const x = 50 + col * (smallGridSize + gapX);
                if (row === 0) {
                    drawJiugonge(ctx, x, y, smallGridSize, bopomofo, tones[col], false, 'gray');
                } else {
                    drawJiugonge(ctx, x, y, smallGridSize, {mid:'', bot:''}, '', false, 'black');
                }
            }
        }

        // 4. 造詞練習欄位
        const textY = smallGridStartY + smallGridSize + Math.floor((baseGapY + shiftUpOffset) / 2);
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 24px DFKai-SB, BiauKai, "微軟正黑體"';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('造詞練習', 50, textY);
    }

    // 繪製單個九宮格的函式
    function drawJiugonge(ctx, x, y, size, textObj, tone, isLarge, textMode) {
        ctx.strokeStyle = '#666666';
        ctx.lineWidth = isLarge ? 3 : 2;
        ctx.strokeRect(x, y, size, size);
        
        ctx.strokeStyle = '#999999';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        const third = size / 3;
        
        ctx.beginPath();
        ctx.moveTo(x + third, y); ctx.lineTo(x + third, y + size);
        ctx.moveTo(x + third * 2, y); ctx.lineTo(x + third * 2, y + size);
        ctx.moveTo(x, y + third); ctx.lineTo(x + size, y + third);
        ctx.moveTo(x, y + third * 2); ctx.lineTo(x + size, y + third * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // 主注音字體尺寸設定為空間 1/2 對半分的特大尺寸
        const fontSize = size * 0.42; 
        ctx.font = `${isLarge ? 'bold' : 'normal'} ${fontSize}px DFKai-SB, BiauKai, "微軟正黑體"`;
        const centerX = x + size / 2;
        
        function drawText(text, tx, ty, isTone, toneAlignX, toneAlignY) {
            ctx.save();
            if (isTone) {
                // 核心修改：聲調同步顯著放大（乘上 1.0 的超醒目 fontSize），字體與注音完美匹配
                ctx.font = `${isLarge ? 'bold' : 'normal'} ${fontSize * 1.0}px DFKai-SB, BiauKai, "微軟正黑體"`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                tx = toneAlignX;
                ty = toneAlignY;
            }

            if (textMode === 'gray') {
                ctx.fillStyle = '#d3d3d3';
                ctx.fillText(text, tx, ty);
            } else if (textMode === 'outline') {
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = isLarge ? 16 : 7; 
                ctx.strokeText(text, tx, ty);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(text, tx, ty);
            } else {
                ctx.fillStyle = '#000000';
                ctx.fillText(text, tx, ty);
            }
            ctx.restore();
        }

        // 1/2 對半平均分配：
        // 1. 介母 (正坐於上半部 1/2 的中央)
        if (textObj.mid) {
            drawText(textObj.mid, centerX, y + size * 0.25, false);
        }
        
        // 2. 韻母 (正坐於下半部 1/2 的中央) 與 聲調
        if (textObj.bot) {
            drawText(textObj.bot, centerX, y + size * 0.75, false);
            
            // 聲調位置精準調整，貼齊放大後的韻母右上方
            if (tone) {
                // 水平位置：貼齊中間縱欄的右側分界虛線
                const toneX = x + (third * 2);
                // 垂直位置微調：配合特大的聲調，上移至下半部格子的偏上方，既清晰又完美不重疊
                const toneY = y + (size * 0.53); 
                drawText(tone, 0, 0, true, toneX, toneY);
            }
        }
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = document.getElementById('worksheet');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
        pdf.save(`二拼結合韻練習單_${currentBopo.m}${currentBopo.f}.pdf`);
    }

    window.onload = function() {
        buildPanel();
        drawWorksheet();
    };
</script>

</body>
</html>
