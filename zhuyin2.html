<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>161個結合韻互動式注音學習單生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'DFKai-SB', 'BiauKai', '微軟正黑體', sans-serif;
            margin: 20px;
            background-color: #f0f4f8;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .control-panel {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h3 { margin: 15px 0 5px 0; color: #2b6cb0; font-size: 16px; }
        
        .grid-section {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn-combin {
            padding: 6px 10px;
            font-size: 15px;
            background-color: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            font-family: 'DFKai-SB', 'BiauKai', sans-serif;
        }
        .btn-combin:hover {
            background-color: #e0f2fe;
            border-color: #7dd3fc;
            color: #0369a1;
            transform: translateY(-1px);
        }
        .btn-combin.active {
            background-color: #3b82f6;
            border-color: #2563eb;
            color: white;
            font-weight: bold;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .current-status {
            font-size: 18px;
            font-weight: bold;
            color: #0f172a;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 6px;
        }
        button.main-btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download { background-color: #059669; color: white; }
        .btn-download:hover { background-color: #047857; }
        
        .canvas-container { text-align: center; margin-top: 20px; }
        canvas {
            border: 1px solid #cbd5e1;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <h2>161個三拼結合韻互動面板</h2>
        <p style="color: #64748b; font-size: 14px; margin-top: -5px;">請直接點選下方對照表中的任意結合韻組合，下方練習單將即時連動生成：</p>
        
        <h3>【ㄧ】的結合韻系列 (54組)</h3>
        <div class="grid-section">
            <div class="btn-group" id="group-i"></div>
        </div>

        <h3>【ㄨ】的結合韻系列 (79組)</h3>
        <div class="grid-section">
            <div class="btn-group" id="group-u"></div>
        </div>

        <h3>【ㄩ】的結合韻系列 (28組)</h3>
        <div class="grid-section">
            <div class="btn-group" id="group-yu"></div>
        </div>

        <div class="action-row">
            <div class="current-status" id="current-text">目前選取：ㄅ + ㄧ + ㄝ</div>
            <button class="main-btn btn-download" onclick="downloadPDF()">下載當前組合 A4 PDF</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="worksheet" width="800" height="1130"></canvas>
    </div>
</div>

<script>
    const initialList = ['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ'];
    
    // ㄧ的結合韻資料庫 (54組)
    const dataI = [
        {m:'ㄧ', f:'ㄝ', s:['ㄅ','ㄆ','ㄇ','ㄉ','ㄊ','ㄋ','ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄧ', f:'ㄚ', s:['ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄧ', f:'ㄛ', s:['ㄅ','ㄆ','ㄇ']},
        {m:'ㄧ', f:'ㄠ', s:['ㄅ','ㄆ','ㄇ','ㄉ','ㄊ','ㄋ','ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄧ', f:'ㄡ', s:['ㄇ','ㄉ','ㄋ','ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄧ', f:'ㄢ', s:['ㄅ','ㄆ','ㄇ','ㄉ','ㄊ','ㄋ','ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄧ', f:'ㄣ', s:['ㄅ','ㄆ','ㄇ','ㄉ','ㄋ','ㄌ']},
        {m:'ㄧ', f:'ㄤ', s:['ㄅ','ㄆ','ㄇ','ㄉ','ㄊ','ㄋ','ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄧ', f:'ㄥ', s:['ㄅ','ㄆ','ㄇ','ㄉ','ㄊ','ㄋ','ㄌ']}
    ];

    // ㄨ的結合韻資料庫 (79組)
    const dataU = [
        {m:'ㄨ', f:'ㄚ', s:['ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄖ']},
        {m:'ㄨ', f:'ㄛ', s:['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄖ','ㄗ','ㄘ','ㄙ']},
        {m:'ㄨ', f:'ㄞ', s:['ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄗ','ㄘ','ㄙ']},
        {m:'ㄨ', f:'ㄟ', s:['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ']},
        {m:'ㄨ', f:'ㄢ', s:['ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ']},
        {m:'ㄨ', f:'ㄣ', s:['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ']},
        {m:'ㄨ', f:'ㄤ', s:['ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄖ']},
        {m:'ㄨ', f:'ㄥ', s:['ㄅ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄙ']}
    ];

    // ㄩ的結合韻資料庫 (28組)
    const dataYu = [
        {m:'ㄩ', f:'ㄝ', s:['ㄋ','ㄌ','ㄐ','ㄑ','ㄒ']},
        {m:'ㄩ', f:'ㄢ', s:['ㄐ','ㄑ','ㄒ']},
        {m:'ㄩ', f:'ㄣ', s:['ㄐ','ㄑ','ㄒ']},
        {m:'ㄩ', f:'ㄥ', s:['ㄐ','ㄑ','ㄒ']}
    ];

    // 關鍵修改：預設初始組合修改為 ㄅㄧㄝ
    let currentBopo = { t: 'ㄅ', m: 'ㄧ', f: 'ㄝ' };

    function buildPanel() {
        renderGroup('group-i', dataI);
        renderGroup('group-u', dataU);
        renderGroup('group-yu', dataYu);
    }

    function renderGroup(targetId, dataArray) {
        const container = document.getElementById(targetId);
        dataArray.forEach(item => {
            item.s.forEach(initial => {
                const btn = document.createElement('button');
                btn.className = 'btn-combin';
                btn.textContent = `${initial}${item.m}${item.f}`;
                
                // 關鍵修改：預設高亮選取 ㄅㄧㄝ 的按鈕
                if(initial==='ㄅ' && item.m==='ㄧ' && item.f==='ㄝ') btn.classList.add('active');
                
                btn.onclick = function() {
                    document.querySelectorAll('.btn-combin').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    currentBopo = { t: initial, m: item.m, f: item.f };
                    document.getElementById('current-text').textContent = `目前選取：${initial} + ${item.m} + ${item.f}`;
                    drawWorksheet();
                };
                container.appendChild(btn);
            });
        });
    }

    function drawWorksheet() {
        const canvas = document.getElementById('worksheet');
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 44px DFKai-SB, BiauKai, "微軟正黑體"';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('注音學習單', 50, 40);
        
        const bopomofo = { top: currentBopo.t, mid: currentBopo.m, bot: currentBopo.f };

        const largeGridY = 120;
        const largeGridSize = 330;
        drawJiugonge(ctx, 50, largeGridY, largeGridSize, bopomofo, '', true, 'black');
        drawJiugonge(ctx, 420, largeGridY, largeGridSize, bopomofo, '', true, 'outline');
        
        const smallGridStartY = 490;
        const smallGridSize = 160;
        const gapX = 30;
        const baseGapY = 30;
        const shiftUpOffset = 25;
        
        const tones = ['', 'ˊ', 'ˇ', 'ˋ'];
        
        for (let row = 0; row < 3; row++) {
            let y = smallGridStartY;
            if (row === 0) y = smallGridStartY;
            else if (row === 1) y = smallGridStartY + smallGridSize + baseGapY + shiftUpOffset;
            else if (row === 2) y = smallGridStartY + (smallGridSize + baseGapY) * 2 + shiftUpOffset;

            for (let col = 0; col < 4; col++) {
                const x = 50 + col * (smallGridSize + gapX);
                if (row === 0) {
                    drawJiugonge(ctx, x, y, smallGridSize, bopomofo, tones[col], false, 'gray');
                } else {
                    drawJiugonge(ctx, x, y, smallGridSize, {top:'', mid:'', bot:''}, '', false, 'black');
                }
            }
        }

        const textY = smallGridStartY + smallGridSize + Math.floor((baseGapY + shiftUpOffset) / 2);
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 24px DFKai-SB, BiauKai, "微軟正黑體"';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('造詞練習', 50, textY);
    }

    function drawJiugonge(ctx, x, y, size, textObj, tone, isLarge, textMode) {
        ctx.strokeStyle = '#666666';
        ctx.lineWidth = isLarge ? 3 : 2;
        ctx.strokeRect(x, y, size, size);
        
        ctx.strokeStyle = '#999999';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        const third = size / 3;
        
        ctx.beginPath();
        ctx.moveTo(x + third, y); ctx.lineTo(x + third, y + size);
        ctx.moveTo(x + third * 2, y); ctx.lineTo(x + third * 2, y + size);
        ctx.moveTo(x, y + third); ctx.lineTo(x + size, y + third);
        ctx.moveTo(x, y + third * 2); ctx.lineTo(x + size, y + third * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const fontSize = third * 0.85; 
        ctx.font = `${isLarge ? 'bold' : 'normal'} ${fontSize}px DFKai-SB, BiauKai, "微軟正黑體"`;
        const centerX = x + size / 2;
        
        function drawText(text, tx, ty, isTone, toneAlignX, toneAlignY) {
            ctx.save();
            if (isTone) {
                ctx.font = `${isLarge ? 'bold' : 'normal'} ${fontSize * 2}px DFKai-SB, BiauKai, "微軟正黑體"`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                tx = toneAlignX;
                ty = toneAlignY;
            }

            if (textMode === 'gray') {
                ctx.fillStyle = '#d3d3d3';
                ctx.fillText(text, tx, ty);
            } else if (textMode === 'outline') {
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = isLarge ? 14 : 7; 
                ctx.strokeText(text, tx, ty);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(text, tx, ty);
            } else {
                ctx.fillStyle = '#000000';
                ctx.fillText(text, tx, ty);
            }
            ctx.restore();
        }

        if (textObj.top) drawText(textObj.top, centerX, y + third * 0.5, false);
        if (textObj.mid) drawText(textObj.mid, centerX, y + third * 1.5, false);
        if (textObj.bot) {
            drawText(textObj.bot, centerX, y + third * 2.5, false);
            if (tone) {
                const toneX = x + (third * 2);
                const toneY = y + (third * 2) + (third * 0.45); 
                drawText(tone, 0, 0, true, toneX, toneY);
            }
        }
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = document.getElementById('worksheet');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
        pdf.save(`注音結合韻練習單_${currentBopo.t}${currentBopo.m}${currentBopo.f}.pdf`);
    }

    window.onload = function() {
        buildPanel();
        drawWorksheet();
    };
</script>

</body>
</html>
